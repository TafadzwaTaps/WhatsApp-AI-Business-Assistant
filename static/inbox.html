<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WaziBot — Inbox</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet"/>
  <link rel="stylesheet" href="/static/inbox.css"/>
</head>
<body>

<!-- ══ MOBILE SIDEBAR OVERLAY ════════════════════════════ -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- ══ TOP BAR ═══════════════════════════════════════════ -->
<header class="topbar">

  <div class="topbar-left">
    <!-- Hamburger (mobile only) -->
    <button class="hamburger" id="hamburger" aria-label="Open contacts">☰</button>

    <a href="/" class="topbar-logo">WaziBot</a>
    <div class="topbar-divider"></div>
    <span class="topbar-title">Inbox</span>
  </div>

  <div class="topbar-center"></div>

  <div class="topbar-right">
    <!-- WebSocket status -->
    <div class="ws-indicator" title="Live connection status">
      <div class="ws-dot" id="ws-dot"></div>
      <span id="ws-label">Connecting…</span>
    </div>

    <!-- Theme toggle -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark mode">☀️</button>

    <!-- Back to dashboard -->
    <a href="/dashboard" class="btn-back">← Dashboard</a>
  </div>

</header>

<!-- ══ MAIN LAYOUT ════════════════════════════════════════ -->
<div class="inbox">

  <!-- ── SIDEBAR ──────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <!-- Search -->
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input
          class="search-input"
          id="search-input"
          type="search"
          placeholder="Search by phone…"
          oninput="filterContacts(this.value)"
          autocomplete="off"
        />
      </div>

      <!-- Filters -->
      <div class="filter-row">
        <button class="filter-btn active" id="filter-all"    onclick="setFilter('all')">All</button>
        <button class="filter-btn"        id="filter-unread" onclick="setFilter('unread')">Unread</button>
        <button class="filter-btn"        id="filter-recent" onclick="setFilter('recent')">Recent</button>
      </div>
    </div>

    <!-- Contact list (rendered by JS) -->
    <div class="contact-list" id="contact-list">
      <!-- Skeletons shown while loading -->
      <div class="skeleton-list" id="skeleton">
        <div class="skeleton-item">
          <div class="skeleton skeleton-avatar"></div>
          <div class="skeleton-lines">
            <div class="skeleton skeleton-line-a"></div>
            <div class="skeleton skeleton-line-b"></div>
          </div>
        </div>
        <div class="skeleton-item">
          <div class="skeleton skeleton-avatar"></div>
          <div class="skeleton-lines">
            <div class="skeleton skeleton-line-a" style="width:45%"></div>
            <div class="skeleton skeleton-line-b" style="width:70%"></div>
          </div>
        </div>
        <div class="skeleton-item">
          <div class="skeleton skeleton-avatar"></div>
          <div class="skeleton-lines">
            <div class="skeleton skeleton-line-a" style="width:60%"></div>
            <div class="skeleton skeleton-line-b"></div>
          </div>
        </div>
      </div>
    </div>

  </aside>

  <!-- ── CHAT PANEL ─────────────────────────────────── -->
  <main class="chat-panel" id="chat-panel">

    <!-- No-conversation selected state -->
    <div class="no-selection" id="no-selection">
      <div class="ns-icon">💬</div>
      <div class="ns-title">Select a conversation</div>
      <div class="ns-sub">Choose a customer from the list to start chatting</div>
    </div>

    <!-- Active conversation (hidden until a chat is opened) -->
    <div id="active-chat" style="display:none; flex:1; flex-direction:column; overflow:hidden;">

      <!-- Chat header -->
      <div class="chat-header">
        <!-- Back arrow on mobile -->
        <button class="chat-header-back" onclick="goBackToList()" aria-label="Back to contacts">←</button>

        <div class="chat-avatar" aria-hidden="true">👤</div>

        <div class="chat-info">
          <div class="chat-phone" id="chat-phone">—</div>
          <div class="chat-status" id="chat-status">—</div>
        </div>

        <div class="chat-actions">
          <button class="icon-btn" onclick="markRead()"                               title="Mark as read">✓ Read</button>
          <button class="icon-btn" onclick="loadMessages(currentCustomerId, true)"    title="Refresh">↻</button>
        </div>
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="chat-messages">
        <button
          class="load-more-btn"
          id="load-more-btn"
          onclick="loadMoreMessages()"
          style="display:none">
          Load earlier messages
        </button>
      </div>

      <!-- Typing indicator -->
      <div class="typing-indicator" id="typing-indicator" aria-live="polite">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>

      <!-- Send box (sticky bottom) -->
      <div class="send-box">
        <textarea
          class="send-input"
          id="send-input"
          placeholder="Type a message… (Enter to send, Shift+Enter for new line)"
          rows="1"
          onkeydown="handleSendKey(event)"
          oninput="autoResize(this)"
          aria-label="Message input"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send message" aria-label="Send">
          ➤
        </button>
      </div>

    </div><!-- /active-chat -->

  </main><!-- /chat-panel -->

</div><!-- /inbox -->

<!-- ══ TOAST (created dynamically by JS) ════════════════ -->

<script src="/static/inbox.js"></script>

<!-- Mobile back-to-list helper (inline, tiny) -->
<script>
  function goBackToList() {
    // On mobile, open the sidebar to show the contacts list
    if (typeof openSidebar === 'function') openSidebar();
  }
</script>

</body>
</html>
