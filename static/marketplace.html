<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WaziBot — Business Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0f0d;--surface:#111a15;--surface2:#172010;--border:#1f3025;
  --green:#22c55e;--green-dim:#16a34a;--text:#e8f5e9;--text-dim:#6b8f71;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
nav{position:sticky;top:0;z-index:50;background:rgba(10,15,13,.92);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  padding:0 24px;height:58px;display:flex;align-items:center;gap:16px;}
.logo{font-size:20px;font-weight:800;color:var(--green);text-decoration:none;}
.nav-sub{font-family:var(--mono);font-size:11px;color:var(--text-dim);}
.hero{padding:48px 24px 32px;text-align:center;}
.hero h1{font-size:clamp(28px,5vw,44px);font-weight:800;margin-bottom:10px;}
.hero h1 span{color:var(--green);}
.hero p{font-family:var(--mono);font-size:13px;color:var(--text-dim);margin-bottom:24px;}
.search-wrap{max-width:480px;margin:0 auto;position:relative;}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 16px 12px 40px;color:var(--text);
  font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--green-dim);}
.search-input::placeholder{color:var(--text-dim);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--text-dim);font-size:14px;}
.container{max-width:1080px;margin:0 auto;padding:0 24px 64px;}
.section-label{font-family:var(--mono);font-size:10px;color:var(--green);
  text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:24px;cursor:pointer;transition:border-color .2s,transform .2s;
  text-decoration:none;display:block;}
.card:hover{border-color:var(--green-dim);transform:translateY(-3px);}
.card-icon{width:44px;height:44px;border-radius:10px;background:var(--surface2);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:20px;margin-bottom:14px;}
.card-name{font-size:16px;font-weight:700;margin-bottom:4px;}
.card-category{font-family:var(--mono);font-size:11px;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.card-tagline{font-size:13px;color:var(--text-dim);line-height:1.5;}
.card-cta{display:inline-flex;align-items:center;gap:6px;margin-top:14px;
  font-family:var(--mono);font-size:11px;color:var(--green);}
.empty{text-align:center;padding:64px 24px;font-family:var(--mono);
  font-size:13px;color:var(--text-dim);}
.loading{text-align:center;padding:64px;font-family:var(--mono);color:var(--text-dim);}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);
  border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.category-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.cat-btn{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:6px 14px;font-family:var(--mono);font-size:11px;color:var(--text-dim);
  cursor:pointer;transition:all .15s;}
.cat-btn:hover,.cat-btn.active{background:var(--green-dim);color:#fff;border-color:var(--green-dim);}
.wa-btn{display:inline-flex;align-items:center;gap:8px;background:#25D366;color:#fff;
  font-weight:800;font-size:12px;padding:8px 16px;border-radius:8px;
  text-decoration:none;margin-top:12px;transition:all .15s;}
.wa-btn:hover{background:#20b95a;}
@media(max-width:600px){.hero{padding:32px 16px 24px;}.container{padding:0 16px 48px;}}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">WaziBot</a>
  <span class="nav-sub">Business Directory</span>
</nav>

<div class="hero">
  <h1>Discover <span>WhatsApp Businesses</span></h1>
  <p>Browse and order from local businesses powered by WaziBot AI</p>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" type="text"
           placeholder="Search businesses, products…" oninput="filterBusinesses()"/>
  </div>
</div>

<div class="container">
  <div id="category-bar" class="category-bar"></div>
  <div class="section-label" id="biz-count"></div>
  <div id="grid" class="grid">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<script>
const API   = '';
let _all    = [];
let _active = 'All';

const CAT_ICONS = {
  'Food & Beverage':'🍽️','Restaurant':'🍽️','Food':'🍔','Bakery':'🍞',
  'Flowers':'🌸','Beauty':'💄','Fashion':'👗','Clothing':'👕',
  'Electronics':'📱','Tech':'💻','Health':'💊','Pharmacy':'🏥',
  'Retail':'🛒','Shop':'🛍️','Services':'🔧','Auto':'🚗',
  'Education':'📚','Barber':'💈','Salon':'💅','Gym':'💪',
  'default':'🏪',
};

function icon(cat) {
  if (!cat) return CAT_ICONS.default;
  for (const [k, v] of Object.entries(CAT_ICONS)) {
    if (cat.toLowerCase().includes(k.toLowerCase())) return v;
  }
  return CAT_ICONS.default;
}

async function load() {
  try {
    const res  = await fetch(API + '/api/directory');
    const data = await res.json();
    _all = data.businesses || [];
    buildCategories();
    render();
  } catch (e) {
    document.getElementById('grid').innerHTML =
      '<div class="empty">Could not load businesses. Please try again.</div>';
  }
}

function buildCategories() {
  const cats = ['All', ...new Set(_all.map(b => b.category).filter(Boolean))];
  const bar = document.getElementById('category-bar');
  bar.innerHTML = cats.map(c =>
    `<button class="cat-btn${c==='All'?' active':''}" onclick="setCategory('${c}')">${c}</button>`
  ).join('');
}

function setCategory(cat) {
  _active = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === cat);
  });
  render();
}

function filterBusinesses() { render(); }

function render() {
  const q    = (document.getElementById('search').value || '').toLowerCase();
  const list = _all.filter(b => {
    const matchCat  = _active === 'All' || b.category === _active;
    const matchQ    = !q || b.name.toLowerCase().includes(q) ||
                      (b.category||'').toLowerCase().includes(q) ||
                      (b.tagline||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('biz-count').textContent =
    `${list.length} business${list.length !== 1 ? 'es' : ''}`;

  if (!list.length) {
    document.getElementById('grid').innerHTML =
      '<div class="empty">No businesses found matching your search.</div>';
    return;
  }

  document.getElementById('grid').innerHTML = list.map(b => {
    const slug = (b.slug || b.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''));
    const wa = b.contact_phone
      ? `<a class="wa-btn" href="https://wa.me/${b.contact_phone.replace(/\D/g,'')}" target="_blank">💬 Order on WhatsApp</a>`
      : `<a class="card-cta" href="/store/${slug}">View Store →</a>`;
    return `
      <a class="card" href="/store/${slug}">
        <div class="card-icon">${icon(b.category)}</div>
        <div class="card-name">${esc(b.name)}</div>
        <div class="card-category">${esc(b.category||'Business')}</div>
        ${b.tagline ? `<div class="card-tagline">${esc(b.tagline)}</div>` : ''}
        ${wa}
      </a>`;
  }).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

load();
</script>
</body>
</html>
