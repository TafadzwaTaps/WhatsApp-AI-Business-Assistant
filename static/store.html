<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WaziBot Store</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0f0d;--surface:#111a15;--surface2:#172010;--border:#1f3025;
  --green:#22c55e;--green-dim:#16a34a;--text:#e8f5e9;--text-dim:#6b8f71;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
nav{position:sticky;top:0;z-index:50;background:rgba(10,15,13,.92);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  padding:0 24px;height:58px;display:flex;align-items:center;gap:16px;}
.logo{font-size:20px;font-weight:800;color:var(--green);text-decoration:none;}
.nav-back{font-family:var(--mono);font-size:12px;color:var(--text-dim);
  text-decoration:none;margin-left:auto;}
.nav-back:hover{color:var(--text);}
.store-hero{padding:40px 24px 28px;border-bottom:1px solid var(--border);}
.container{max-width:1080px;margin:0 auto;}
.store-info{display:flex;align-items:center;gap:18px;margin-bottom:16px;}
.store-logo{width:56px;height:56px;border-radius:12px;background:var(--surface2);
  border:1px solid var(--border);display:flex;align-items:center;
  justify-content:center;font-size:24px;flex-shrink:0;}
.store-name{font-size:clamp(22px,4vw,34px);font-weight:800;}
.store-category{font-family:var(--mono);font-size:11px;color:var(--green);
  text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.store-tagline{font-size:14px;color:var(--text-dim);margin-top:8px;line-height:1.5;}
.order-btn{display:inline-flex;align-items:center;gap:8px;background:#25D366;
  color:#fff;font-weight:800;font-size:14px;padding:12px 24px;border-radius:10px;
  text-decoration:none;margin-top:16px;transition:all .15s;
  box-shadow:0 0 20px rgba(37,211,102,.2);}
.order-btn:hover{background:#20b95a;transform:translateY(-1px);}
.products{padding:32px 24px 64px;}
.section-label{font-family:var(--mono);font-size:10px;color:var(--green);
  text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.prod-card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;transition:border-color .2s;}
.prod-card:hover{border-color:var(--green-dim);}
.prod-img{width:100%;height:160px;object-fit:cover;background:var(--surface2);}
.prod-img-placeholder{width:100%;height:160px;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;font-size:40px;}
.prod-body{padding:16px;}
.prod-name{font-size:15px;font-weight:700;margin-bottom:4px;}
.prod-desc{font-size:12px;color:var(--text-dim);font-family:var(--mono);
  line-height:1.5;margin-bottom:10px;}
.prod-price{font-size:18px;font-weight:800;color:var(--green);}
.prod-unavail{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:4px;}
.loading{text-align:center;padding:64px;font-family:var(--mono);color:var(--text-dim);}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);
  border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.error{text-align:center;padding:64px 24px;font-family:var(--mono);
  font-size:13px;color:var(--text-dim);}
.empty{text-align:center;padding:48px;font-family:var(--mono);color:var(--text-dim);}
@media(max-width:600px){.store-hero,.products{padding-left:16px;padding-right:16px;}}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">WaziBot</a>
  <a href="/directory" class="nav-back">← Directory</a>
</nav>

<div id="store-hero" class="store-hero" style="display:none;">
  <div class="container">
    <div class="store-info">
      <div class="store-logo" id="store-logo">🏪</div>
      <div>
        <div class="store-name" id="store-name">—</div>
        <div class="store-category" id="store-category"></div>
        <div class="store-tagline" id="store-tagline"></div>
      </div>
    </div>
    <a class="order-btn" id="order-btn" href="#" target="_blank">
      💬 Order on WhatsApp
    </a>
  </div>
</div>

<div class="products">
  <div class="container">
    <div id="loading" class="loading"><div class="spinner"></div></div>
    <div id="error" class="error" style="display:none;">Store not found.</div>
    <div id="products-section" style="display:none;">
      <div class="section-label" id="prod-count"></div>
      <div class="grid" id="products-grid"></div>
    </div>
  </div>
</div>

<script>
const API  = '';
const slug = window.location.pathname.split('/').filter(Boolean).pop() || '';

const CAT_ICONS = {
  'Food':'🍽️','Restaurant':'🍽️','Bakery':'🍞','Flowers':'🌸','Beauty':'💄',
  'Fashion':'👗','Electronics':'📱','Health':'💊','Retail':'🛒','Barber':'💈',
  'default':'🏪',
};
function icon(cat) {
  for (const [k,v] of Object.entries(CAT_ICONS))
    if ((cat||'').toLowerCase().includes(k.toLowerCase())) return v;
  return CAT_ICONS.default;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sym(b){return b.currency_sym||b.currency_symbol||'$';}

async function load() {
  if (!slug || slug === 'store') {
    document.getElementById('loading').style.display='none';
    document.getElementById('error').style.display='block';
    document.getElementById('error').textContent='No store specified.';
    return;
  }
  try {
    const res  = await fetch(`${API}/api/store/${encodeURIComponent(slug)}`);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    renderStore(data.business, data.products||[]);
  } catch(e) {
    document.getElementById('loading').style.display='none';
    document.getElementById('error').style.display='block';
    document.getElementById('error').textContent=
      `Store "${slug}" not found. It may have moved or been removed.`;
  }
}

function renderStore(biz, products) {
  document.title = `${biz.name} — WaziBot`;

  document.getElementById('store-logo').textContent    = icon(biz.category);
  document.getElementById('store-name').textContent    = biz.name||'';
  document.getElementById('store-category').textContent= biz.category||'';
  document.getElementById('store-tagline').textContent = biz.tagline||'';

  if (biz.logo_url) {
    const img = document.createElement('img');
    img.src   = biz.logo_url;
    img.style = 'width:56px;height:56px;border-radius:12px;object-fit:cover;';
    img.onerror = () => {};
    document.getElementById('store-logo').replaceWith(img);
  }

  const phone = biz.contact_phone||'';
  const waMsg = encodeURIComponent(`Hi! I'd like to order from ${biz.name}`);
  if (phone) {
    document.getElementById('order-btn').href =
      `https://wa.me/${phone.replace(/\D/g,'')}?text=${waMsg}`;
  } else {
    document.getElementById('order-btn').style.display='none';
  }
  document.getElementById('store-hero').style.display='block';
  document.getElementById('loading').style.display='none';

  document.getElementById('prod-count').textContent =
    `${products.length} product${products.length!==1?'s':''}`;

  if (!products.length) {
    document.getElementById('products-grid').innerHTML =
      '<div class="empty">No products listed yet.</div>';
  } else {
    const curr = sym(biz);
    document.getElementById('products-grid').innerHTML = products.map(p => {
      const img = p.image_url
        ? `<img class="prod-img" src="${esc(p.image_url)}" alt="${esc(p.name)}" loading="lazy"/>`
        : `<div class="prod-img-placeholder">📦</div>`;
      const avail = p.available===false
        ? '<div class="prod-unavail">Out of stock</div>' : '';
      return `
        <div class="prod-card">
          ${img}
          <div class="prod-body">
            <div class="prod-name">${esc(p.name)}</div>
            ${p.description?`<div class="prod-desc">${esc(p.description)}</div>`:''}
            <div class="prod-price">${curr}${parseFloat(p.price||0).toFixed(2)}</div>
            ${avail}
          </div>
        </div>`;
    }).join('');
  }
  document.getElementById('products-section').style.display='block';
}

load();
</script>
</body>
</html>
